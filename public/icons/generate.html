<!DOCTYPE html>
<html>
<head><title>Generate VeggieBudino Icons</title></head>
<body style="font-family: sans-serif; padding: 40px; background: #FDF8F3; text-align: center;">
<h2>VeggieBudino — Elige el que más te guste</h2>
<p>3 opciones. Descarga el que prefieras.</p>

<div style="display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; margin-top: 30px;">

  <div>
    <h3>Opción A — Maceta minimalista</h3>
    <canvas id="cA" width="512" height="512" style="border-radius: 100px; box-shadow: 0 8px 30px rgba(0,0,0,0.12);"></canvas>
  </div>

  <div>
    <h3>Opción B — Brote creciendo</h3>
    <canvas id="cB" width="512" height="512" style="border-radius: 100px; box-shadow: 0 8px 30px rgba(0,0,0,0.12);"></canvas>
  </div>

  <div>
    <h3>Opción C — Planta en bowl</h3>
    <canvas id="cC" width="512" height="512" style="border-radius: 100px; box-shadow: 0 8px 30px rgba(0,0,0,0.12);"></canvas>
  </div>

</div>

<script>
function roundedRect(ctx, s) {
  const r = s * 0.22;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(s-r, 0); ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s-r); ctx.quadraticCurveTo(s, s, s-r, s);
  ctx.lineTo(r, s); ctx.quadraticCurveTo(0, s, 0, s-r);
  ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
}

function bgGradient(ctx, s) {
  const grad = ctx.createLinearGradient(0, 0, s * 0.3, s);
  grad.addColorStop(0, '#D4654A');
  grad.addColorStop(1, '#A34830');
  return grad;
}

// ======= OPTION A: Maceta minimalista =======
function drawA(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;

  roundedRect(ctx, s);
  ctx.fillStyle = bgGradient(ctx, s);
  ctx.fill();

  ctx.save();
  ctx.translate(s/2, s/2);
  const sc = s/512;
  ctx.scale(sc, sc);

  // Pot
  ctx.beginPath();
  ctx.moveTo(-55, 30);
  ctx.lineTo(-45, 100);
  ctx.quadraticCurveTo(-40, 115, 0, 115);
  ctx.quadraticCurveTo(40, 115, 45, 100);
  ctx.lineTo(55, 30);
  ctx.closePath();
  ctx.fillStyle = '#D5C58A';
  ctx.fill();

  // Pot rim
  ctx.beginPath();
  ctx.moveTo(-65, 20);
  ctx.lineTo(65, 20);
  ctx.quadraticCurveTo(70, 20, 70, 30);
  ctx.lineTo(70, 38);
  ctx.quadraticCurveTo(70, 44, 64, 44);
  ctx.lineTo(-64, 44);
  ctx.quadraticCurveTo(-70, 44, -70, 38);
  ctx.lineTo(-70, 30);
  ctx.quadraticCurveTo(-70, 20, -65, 20);
  ctx.closePath();
  ctx.fillStyle = '#E8DDB5';
  ctx.fill();

  // Soil
  ctx.beginPath();
  ctx.ellipse(0, 32, 50, 10, 0, 0, Math.PI);
  ctx.fillStyle = '#8B6B4A';
  ctx.fill();

  // Main stem
  ctx.beginPath();
  ctx.moveTo(0, 25);
  ctx.bezierCurveTo(-3, -10, 5, -60, 0, -100);
  ctx.strokeStyle = '#478778';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Left leaf 1
  ctx.beginPath();
  ctx.moveTo(-3, -20);
  ctx.bezierCurveTo(-50, -30, -70, -60, -50, -75);
  ctx.bezierCurveTo(-30, -88, -5, -55, -3, -20);
  ctx.fillStyle = '#5EA892';
  ctx.fill();

  // Right leaf 1
  ctx.beginPath();
  ctx.moveTo(3, -45);
  ctx.bezierCurveTo(48, -52, 68, -80, 50, -95);
  ctx.bezierCurveTo(32, -108, 5, -78, 3, -45);
  ctx.fillStyle = '#478778';
  ctx.fill();

  // Left leaf 2 (smaller, higher)
  ctx.beginPath();
  ctx.moveTo(-2, -70);
  ctx.bezierCurveTo(-35, -78, -48, -100, -35, -110);
  ctx.bezierCurveTo(-22, -118, -4, -95, -2, -70);
  ctx.fillStyle = '#6BC4A6';
  ctx.fill();

  // Top leaf (tiny)
  ctx.beginPath();
  ctx.moveTo(0, -100);
  ctx.bezierCurveTo(15, -115, 25, -130, 18, -138);
  ctx.bezierCurveTo(10, -145, -2, -125, 0, -100);
  ctx.fillStyle = '#5EA892';
  ctx.fill();

  // Leaf veins (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-3, -20); ctx.quadraticCurveTo(-35, -50, -50, -75); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(3, -45); ctx.quadraticCurveTo(35, -70, 50, -95); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-2, -70); ctx.quadraticCurveTo(-25, -92, -35, -110); ctx.stroke();

  ctx.restore();

  // Text
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.textAlign = 'center';
  ctx.font = `bold ${s*0.11}px 'Segoe UI', sans-serif`;
  ctx.fillText('VeggieBudino', s/2, s*0.92);
}

// ======= OPTION B: Brote creciendo =======
function drawB(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;

  roundedRect(ctx, s);
  ctx.fillStyle = bgGradient(ctx, s);
  ctx.fill();

  ctx.save();
  ctx.translate(s/2, s*0.52);
  const sc = s/512;
  ctx.scale(sc, sc);

  // Ground line
  ctx.beginPath();
  ctx.ellipse(0, 90, 100, 18, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fill();

  // Stem — elegant curve
  ctx.beginPath();
  ctx.moveTo(0, 85);
  ctx.bezierCurveTo(0, 50, -8, 0, 5, -60);
  ctx.bezierCurveTo(10, -90, 5, -120, 0, -140);
  ctx.strokeStyle = '#478778';
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Big left leaf
  ctx.beginPath();
  ctx.moveTo(-2, -30);
  ctx.bezierCurveTo(-20, -35, -80, -55, -90, -90);
  ctx.bezierCurveTo(-95, -110, -70, -120, -50, -110);
  ctx.bezierCurveTo(-25, -98, -5, -60, -2, -30);
  const lg1 = ctx.createLinearGradient(-90, -90, 0, -30);
  lg1.addColorStop(0, '#6BC4A6');
  lg1.addColorStop(1, '#478778');
  ctx.fillStyle = lg1;
  ctx.fill();

  // Big right leaf
  ctx.beginPath();
  ctx.moveTo(3, -70);
  ctx.bezierCurveTo(20, -75, 75, -90, 88, -120);
  ctx.bezierCurveTo(95, -140, 72, -150, 55, -142);
  ctx.bezierCurveTo(30, -130, 8, -100, 3, -70);
  const lg2 = ctx.createLinearGradient(88, -120, 3, -70);
  lg2.addColorStop(0, '#5EA892');
  lg2.addColorStop(1, '#356858');
  ctx.fillStyle = lg2;
  ctx.fill();

  // Small top leaves (unfurling)
  ctx.beginPath();
  ctx.moveTo(0, -140);
  ctx.bezierCurveTo(-15, -155, -30, -175, -22, -185);
  ctx.bezierCurveTo(-14, -192, 0, -170, 0, -140);
  ctx.fillStyle = '#6BC4A6';
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(0, -140);
  ctx.bezierCurveTo(12, -158, 25, -175, 20, -185);
  ctx.bezierCurveTo(14, -192, 2, -168, 0, -140);
  ctx.fillStyle = '#5EA892';
  ctx.fill();

  // Veins
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.moveTo(-2, -30); ctx.quadraticCurveTo(-50, -70, -75, -100); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(3, -70); ctx.quadraticCurveTo(45, -105, 72, -132); ctx.stroke();

  // Small roots at base
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, 85); ctx.quadraticCurveTo(-20, 100, -35, 95); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, 85); ctx.quadraticCurveTo(18, 102, 30, 97); ctx.stroke();

  ctx.restore();

  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.textAlign = 'center';
  ctx.font = `bold ${s*0.11}px 'Segoe UI', sans-serif`;
  ctx.fillText('VeggieBudino', s/2, s*0.93);
}

// ======= OPTION C: Planta en bowl =======
function drawC(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;

  roundedRect(ctx, s);
  ctx.fillStyle = bgGradient(ctx, s);
  ctx.fill();

  ctx.save();
  ctx.translate(s/2, s*0.48);
  const sc = s/512;
  ctx.scale(sc, sc);

  // Bowl
  ctx.beginPath();
  ctx.moveTo(-80, 20);
  ctx.quadraticCurveTo(-85, 85, -40, 100);
  ctx.quadraticCurveTo(0, 110, 40, 100);
  ctx.quadraticCurveTo(85, 85, 80, 20);
  ctx.closePath();
  const bowlGrad = ctx.createLinearGradient(0, 20, 0, 100);
  bowlGrad.addColorStop(0, '#E8DDB5');
  bowlGrad.addColorStop(1, '#D5C58A');
  ctx.fillStyle = bowlGrad;
  ctx.fill();

  // Bowl inner shadow
  ctx.beginPath();
  ctx.ellipse(0, 28, 70, 14, 0, 0, Math.PI);
  ctx.fillStyle = 'rgba(139,107,74,0.3)';
  ctx.fill();

  // Stems (3 plants growing from bowl)
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';

  // Center stem
  ctx.beginPath();
  ctx.moveTo(0, 18);
  ctx.bezierCurveTo(0, -20, -5, -70, 0, -110);
  ctx.strokeStyle = '#478778';
  ctx.stroke();

  // Left stem
  ctx.beginPath();
  ctx.moveTo(-20, 20);
  ctx.bezierCurveTo(-25, -5, -40, -50, -35, -85);
  ctx.strokeStyle = '#5EA892';
  ctx.stroke();

  // Right stem
  ctx.beginPath();
  ctx.moveTo(20, 20);
  ctx.bezierCurveTo(28, -5, 38, -45, 30, -80);
  ctx.strokeStyle = '#478778';
  ctx.stroke();

  // Center leaves
  ctx.beginPath();
  ctx.moveTo(0, -80);
  ctx.bezierCurveTo(-25, -95, -35, -120, -20, -130);
  ctx.bezierCurveTo(-5, -138, 0, -110, 0, -80);
  ctx.fillStyle = '#478778';
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(0, -80);
  ctx.bezierCurveTo(22, -98, 35, -122, 22, -130);
  ctx.bezierCurveTo(8, -138, 0, -108, 0, -80);
  ctx.fillStyle = '#5EA892';
  ctx.fill();

  // Top tiny leaf
  ctx.beginPath();
  ctx.moveTo(0, -110);
  ctx.bezierCurveTo(-8, -125, -5, -140, 2, -140);
  ctx.bezierCurveTo(8, -140, 8, -125, 0, -110);
  ctx.fillStyle = '#6BC4A6';
  ctx.fill();

  // Left plant leaves
  ctx.beginPath();
  ctx.moveTo(-35, -55);
  ctx.bezierCurveTo(-60, -60, -78, -80, -65, -92);
  ctx.bezierCurveTo(-50, -100, -37, -78, -35, -55);
  ctx.fillStyle = '#5EA892';
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(-35, -75);
  ctx.bezierCurveTo(-18, -85, -10, -105, -20, -110);
  ctx.bezierCurveTo(-30, -115, -35, -95, -35, -75);
  ctx.fillStyle = '#6BC4A6';
  ctx.fill();

  // Right plant leaves
  ctx.beginPath();
  ctx.moveTo(30, -50);
  ctx.bezierCurveTo(55, -58, 72, -78, 60, -88);
  ctx.bezierCurveTo(48, -96, 32, -72, 30, -50);
  ctx.fillStyle = '#478778';
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(30, -70);
  ctx.bezierCurveTo(15, -82, 10, -100, 20, -105);
  ctx.bezierCurveTo(30, -110, 32, -90, 30, -70);
  ctx.fillStyle = '#5EA892';
  ctx.fill();

  // Leaf veins
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, -80); ctx.quadraticCurveTo(-18, -108, -20, -130); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -80); ctx.quadraticCurveTo(15, -108, 22, -130); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-35, -55); ctx.quadraticCurveTo(-55, -72, -65, -92); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(30, -50); ctx.quadraticCurveTo(50, -68, 60, -88); ctx.stroke();

  // Bowl line detail
  ctx.beginPath();
  ctx.ellipse(0, 50, 55, 5, 0, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(139,107,74,0.15)';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.restore();

  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.textAlign = 'center';
  ctx.font = `bold ${s*0.11}px 'Segoe UI', sans-serif`;
  ctx.fillText('VeggieBudino', s/2, s*0.93);
}

drawA(document.getElementById('cA'));
drawB(document.getElementById('cB'));
drawC(document.getElementById('cC'));

['cA', 'cB', 'cC'].forEach(id => {
  const canvas = document.getElementById(id);
  ['192', '512'].forEach(size => {
    const small = document.createElement('canvas');
    small.width = parseInt(size);
    small.height = parseInt(size);
    small.getContext('2d').drawImage(canvas, 0, 0, parseInt(size), parseInt(size));

    const link = document.createElement('a');
    link.download = `icon-${size}.png`;
    link.href = small.toDataURL('image/png');

    const label = id === 'cA' ? 'Maceta' : id === 'cB' ? 'Brote' : 'Bowl';
    const btn = document.createElement('button');
    btn.textContent = `⬇ ${label} ${size}px`;
    btn.style.cssText = 'margin: 4px; padding: 8px 16px; background: #C75B3C; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px;';
    btn.onclick = () => link.click();
    canvas.parentNode.appendChild(btn);
  });
});
</script>
</body>
</html>
